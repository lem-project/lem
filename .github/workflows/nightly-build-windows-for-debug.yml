name: Nightly Build (Windows)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build even if no changes since last nightly'
        type: boolean
        default: false

permissions:
  contents: write

concurrency: nightly-${{ github.workflow }}

env:
  NIGHTLY_TAG: nightly-latest

jobs:
  windows:
    name: Nightly Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      WINDOWS_CERT_PFX_B64: ${{ secrets.WINDOWS_CERT_PFX_B64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Check changes since last nightly
        id: diff
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force != true)
        run: |
          TAG="${NIGHTLY_TAG}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            if git diff --quiet "$TAG"...HEAD -- .; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: No changes — skip build
        if: steps.diff.outputs.skip == 'true'
        run: echo "No changes since last nightly. Skipping."

      - name: Install SBCL (latest MSI)
        if: steps.diff.outputs.skip != 'true'
        run: |
          rel=$(curl -s https://api.github.com/repos/roswell/sbcl_bin/releases/latest)
          url=$(echo "$rel" | grep browser_download_url | grep -i windows | grep -i msi | cut -d '"' -f 4 | head -n1)
          [ -z "$url" ] && { echo "SBCL MSI not found"; exit 1; }
          curl -L "$url" -o sbcl.msi
          msiexec //i sbcl.msi //qn //norestart

          # インストール先を探す（"Program Files" or "Program Files (x86)"）
          sbcl_dir=$(find "/c/Program Files" "/c/Program Files (x86)" -type f -name sbcl.exe 2>/dev/null | head -n1)
          if [ -z "$sbcl_dir" ]; then
            echo "sbcl.exe not found after install."
            exit 1
          fi
          sbcl_bin=$(dirname "$sbcl_dir")
          echo "$sbcl_bin" >> $GITHUB_PATH
          export PATH="$sbcl_bin:$PATH"

          # 確認
          sbcl --version

      - name: Install Quicklisp
        if: steps.diff.outputs.skip != 'true'
        run: |
          curl -O https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive \
               --load quicklisp.lisp \
               --eval "(quicklisp-quickstart:install)" \
               --eval "(ql::without-prompting (ql:add-to-init-file))"

      - name: Prepare $HOME/common-lisp and move lem
        if: steps.diff.outputs.skip != 'true'
        run: |
          mkdir -p "$HOME/common-lisp"
          cp "$GITHUB_WORKSPACE" "$HOME/common-lisp/lem"

      - name: Resolve qlfile dependencies
        if: steps.diff.outputs.skip != 'true'
        working-directory: $HOME/common-lisp/lem
        run: |
          if [ -f qlfile ]; then
            while read -r line; do
              [ -z "$line" ] && continue
              case "$line" in
                git\ *)
                  name=$(echo "$line" | awk '{print $2}')
                  url=$(echo "$line" | awk '{print $3}')
                  git clone --depth 1 "$url" "$HOME/common-lisp/$name"
                  ;;
                "ql uiop")
                  git clone --depth 1 https://gitlab.common-lisp.net/asdf/asdf.git "$HOME/common-lisp/asdf"
                  (cd "$HOME/common-lisp/asdf" && sh make-asdf.sh)
                  ;;
              esac
            done < qlfile
          fi

      - name: Build Lem
        if: steps.diff.outputs.skip != 'true'
        working-directory: $HOME/common-lisp/lem
        run: |
          sbcl --eval "(ql:quickload :lem)" \
               --eval "(asdf:make :lem)"

      - name: Code sign lem.exe
        if: steps.diff.outputs.skip != 'true'
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.pfx"
          echo "$WINDOWS_CERT_PFX_B64" | base64 -d > "$CERT_PATH"
          # signtool.exe は Windows SDK の bin にある
          SIGNTOOL=$(cmd /c "where signtool.exe" | head -n1 | tr -d '\r')
          "$SIGNTOOL" sign /f "$CERT_PATH" /p "$WINDOWS_CERT_PASSWORD" /tr "http://timestamp.digicert.com" /td sha256 /fd sha256 "$HOME/common-lisp/lem/bin/lem.exe"

      - name: Package artifacts (Windows)
        if: steps.diff.outputs.skip != 'true'
        run: |
          mkdir -p dist
          zip -j dist/lem-windows.zip "$HOME/common-lisp/lem/bin/"*

      - name: Upload artifact
        if: steps.diff.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lem-windows
          path: dist/lem-windows.zip
