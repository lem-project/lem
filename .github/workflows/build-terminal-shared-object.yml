name: Verify terminal.so builds

# Verifies that the lem-terminal native helper (terminal.so) still compiles
# from extensions/terminal/terminal.c via `make terminal-lib`. The prebuilt
# .so binaries are no longer committed to the repository (see #1964), so this
# job guards the from-source build path instead of re-committing artifacts.

on:
  push:
    branches:
      - main
    paths:
      - 'extensions/terminal/terminal.c'
      - 'extensions/terminal/ffi.lisp'
      - 'scripts/build-terminal.lisp'
      - '.github/workflows/build-terminal-shared-object.yml'
  pull_request:
    paths:
      - 'extensions/terminal/terminal.c'
      - 'extensions/terminal/ffi.lisp'
      - 'scripts/build-terminal.lisp'
      - '.github/workflows/build-terminal-shared-object.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build terminal.so (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SBCL and libvterm (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl libvterm-dev

      - name: Install SBCL and libvterm (macOS)
        if: runner.os == 'macOS'
        run: brew install sbcl libvterm

      - name: Build terminal.so
        run: make terminal-lib

      - name: Assert the shared library was produced
        run: |
          found="$(find extensions/terminal/lib -name 'terminal.so' -print -quit)"
          if [ -z "$found" ]; then
            echo "::error::terminal.so was not produced by 'make terminal-lib'" >&2
            exit 1
          fi
          echo "Built: $found"
          file "$found"
